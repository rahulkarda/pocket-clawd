<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- macOS-style app icon for Pocket Clawd. Squircle background gradient
       with the Clawd mascot centered + slightly oversized so the icon reads
       at small sizes too. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(124,111,247,0.22)"/>
      <stop offset="100%" stop-color="rgba(124,111,247,0)"/>
    </radialGradient>
  </defs>

  <!-- Squircle background (Apple-style 22.5% corner radius) -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>
  <!-- Soft purple glow behind the mascot -->
  <circle cx="512" cy="540" r="380" fill="url(#glow)"/>

  <!-- Clawd, scaled from the 64-unit canvas to fill ~640px centered.
       Drawn as the Idle pose. We use a transform-group: translate(192,192)
       then scale(10) so coordinates map 1:1 to the source SVG. -->
  <g transform="translate(192,192) scale(10)" shape-rendering="crispEdges">
    <!-- Ear nubs -->
    <rect x="4"  y="18" width="4"  height="8"  rx="2" fill="#D4622A"/>
    <rect x="56" y="18" width="4"  height="8"  rx="2" fill="#D4622A"/>
    <!-- Body -->
    <rect x="8"  y="12" width="48" height="32" rx="4" fill="#D4622A"/>
    <!-- Body shadow stripe -->
    <rect x="8"  y="40" width="48" height="4"  rx="0" fill="#A84B1F"/>
    <!-- Eyes -->
    <rect x="18" y="20" width="8"  height="10" rx="2" fill="#1a1208"/>
    <rect x="38" y="20" width="8"  height="10" rx="2" fill="#1a1208"/>
    <!-- Legs -->
    <rect x="14" y="44" width="8"  height="12" rx="2" fill="#D4622A"/>
    <rect x="28" y="44" width="8"  height="12" rx="2" fill="#D4622A"/>
    <rect x="42" y="44" width="8"  height="12" rx="2" fill="#D4622A"/>
    <!-- Foot shadow -->
    <rect x="14" y="54" width="8"  height="2"  fill="#A84B1F"/>
    <rect x="28" y="54" width="8"  height="2"  fill="#A84B1F"/>
    <rect x="42" y="54" width="8"  height="2"  fill="#A84B1F"/>
  </g>
</svg>
